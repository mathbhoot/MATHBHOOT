project_id = "mathbhoot"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:4173"
additional_redirect_urls = [
  "http://localhost:4173/**",
  "http://127.0.0.1:4173/**",
  "https://mathbhoot.com/**",
  "https://www.mathbhoot.com/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[auth.rate_limit]
email_sent = 2
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = false

[edge_runtime]
enabled = true
policy = "per_worker"
